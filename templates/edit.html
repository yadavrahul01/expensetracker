{% extends "base.html" %}
{% block content %}

<h1>Edit Expense / Income</h1>
<form action="{{ url_for('edit', id=expense[0]) }}" method="POST">
    <input type="text" name="title" value="{{ expense[1] }}" required>
    <input type="number" step="0.01" name="amount" value="{{ expense[2] }}" required>
    <input type="text" name="category" value="{{ expense[3] }}" required>
    <select name="type" required>
        <option value="Expense" {% if expense[4]=='Expense' %}selected{% endif %}>Expense</option>
        <option value="Income" {% if expense[4]=='Income' %}selected{% endif %}>Income</option>
    </select>
    <input type="date" name="date" value="{{ expense[5] }}" required>
    <button type="submit">Update</button>
</form>

<a href="{{ url_for('index') }}">Back to Dashboard</a>

{% endblock %}
